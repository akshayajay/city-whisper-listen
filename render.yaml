services:
  - type: web
    name: citypulse-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: USE_MOCK_ML
        value: true
      - key: ENABLE_BACKGROUND_JOBS
        value: true
      - key: REALTIME_INGEST_INTERVAL_SECONDS
        value: 8

  - type: web
    name: citypulse-dashboard
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://citypulse-api.onrender.com
